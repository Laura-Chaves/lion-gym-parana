<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lion Gym Paraná — Caja</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo-area img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 0.6rem;
      filter: drop-shadow(0 0 18px #cc0000aa);
    }

    .logo-texto {
      font-size: 1.8rem;
      font-weight: 900;
      color: #cc0000;
      letter-spacing: 3px;
    }

    .subtitulo {
      color: #666;
      font-size: 0.85rem;
      margin-top: 0.2rem;
      letter-spacing: 1px;
    }

    .nav-links {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
    }

    .nav-links a {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-links a:hover {
      color: #cc0000;
      border-color: #cc0000;
    }

    .contenedor {
      width: 100%;
      max-width: 700px;
    }

    /* Selector de período */
    .periodo-selector {
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .periodo-selector label {
      font-size: 0.85rem;
      color: #aaa;
    }

    .periodo-selector select,
    .periodo-selector input {
      padding: 0.5rem 0.8rem;
      font-size: 0.95rem;
      border: 2px solid #333;
      border-radius: 8px;
      background: #111;
      color: white;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .periodo-selector select:focus,
    .periodo-selector input:focus { border-color: #cc0000; }

    .btn-ver {
      padding: 0.55rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 700;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-ver:hover { background: #aa0000; }

    .btn-exportar {
      padding: 0.55rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 700;
      background: #2a2a2a;
      color: #ccc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-left: auto;
    }

    .btn-exportar:hover { background: #333; }

    /* Resumen */
    .resumen {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .resumen-item {
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      padding: 1.2rem;
      text-align: center;
    }

    .resumen-item .numero {
      font-size: 1.4rem;
      font-weight: 800;
      margin-top: 0.3rem;
    }

    .resumen-item .etiqueta {
      font-size: 0.72rem;
      color: #888;
      letter-spacing: 0.5px;
    }

    .resumen-item.ingresos .numero { color: #4cdf7a; }
    .resumen-item.gastos .numero { color: #df4c4c; }
    .resumen-item.resultado .numero { color: #ffd700; }
    .resumen-item.resultado { border-color: #444; }

    /* Secciones */
    .seccion {
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .seccion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .seccion-header h2 {
      font-size: 1rem;
      color: #cc0000;
      letter-spacing: 0.5px;
    }

    .seccion-header .total-seccion {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .total-ingreso { color: #4cdf7a; }
    .total-gasto { color: #df4c4c; }

    /* Items de lista */
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.88rem;
    }

    .item:last-child { border-bottom: none; }

    .item .descripcion { font-weight: 600; }
    .item .detalle { color: #888; font-size: 0.8rem; margin-top: 0.15rem; }
    .item .monto-ingreso { color: #4cdf7a; font-weight: 700; white-space: nowrap; }
    .item .monto-gasto { color: #df4c4c; font-weight: 700; white-space: nowrap; }

    .btn-eliminar-gasto {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 0.8rem;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .btn-eliminar-gasto:hover { color: #df4c4c; }

    .vacio {
      color: #666;
      font-size: 0.85rem;
      text-align: center;
      padding: 1.5rem 0;
    }

    /* Botón agregar gasto */
    .btn-agregar-gasto {
      width: 100%;
      padding: 0.8rem;
      font-size: 0.9rem;
      font-weight: 700;
      background: transparent;
      color: #cc0000;
      border: 2px dashed #cc0000;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 1rem;
    }

    .btn-agregar-gasto:hover { background: rgba(204,0,0,0.08); }

    /* Formulario inline de gasto */
    .form-gasto {
      display: none;
      margin-top: 1rem;
      border-top: 1px solid #2a2a2a;
      padding-top: 1rem;
    }

    .form-gasto.visible { display: block; }

    .fila-doble {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .campo label {
      display: block;
      font-size: 0.78rem;
      color: #aaa;
      margin-bottom: 0.3rem;
    }

    .campo input,
    .campo select {
      width: 100%;
      padding: 0.7rem 0.8rem;
      font-size: 0.9rem;
      border: 2px solid #333;
      border-radius: 8px;
      background: #111;
      color: white;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .campo input:focus,
    .campo select:focus { border-color: #cc0000; }

    .form-gasto-acciones {
      display: flex;
      gap: 0.8rem;
      margin-top: 0.8rem;
    }

    .btn-guardar-gasto {
      flex: 1;
      padding: 0.8rem;
      font-size: 0.9rem;
      font-weight: 700;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-guardar-gasto:hover { background: #aa0000; }
    .btn-guardar-gasto:disabled { background: #555; cursor: not-allowed; }

    .btn-cancelar-gasto {
      flex: 1;
      padding: 0.8rem;
      font-size: 0.9rem;
      font-weight: 700;
      background: #2a2a2a;
      color: #ccc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancelar-gasto:hover { background: #333; }

    .mensaje {
      margin-top: 0.8rem;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }

    .mensaje.exito {
      background: #0d2e1a;
      border: 1px solid #1a7a3a;
      color: #4cdf7a;
    }

    .mensaje.error {
      background: #2e0d0d;
      border: 1px solid #7a1a1a;
      color: #df4c4c;
    }
  </style>
</head>
<body>

  <div class="logo-area">
    <img src="leon.webp" alt="Lion Gym">
    <div class="logo-texto">LION GYM</div>
    <div class="subtitulo">PARANÁ — CAJA</div>
    <div class="nav-links">
      <a href="panel-general.html">Panel general</a>
      <a href="registro-pagos.html">Registrar pago</a>
      <a href="planes.html">Planes</a>
      <a href="index.html">Inicio</a>
      <a href="#" onclick="cerrarSesion(); return false;">Cerrar sesión</a>
    </div>
  </div>

  <div class="contenedor">

    <div class="periodo-selector">
      <label>Mes</label>
      <select id="selectMes">
        <option value="1">Enero</option>
        <option value="2">Febrero</option>
        <option value="3">Marzo</option>
        <option value="4">Abril</option>
        <option value="5">Mayo</option>
        <option value="6">Junio</option>
        <option value="7" selected>Julio</option>
        <option value="8">Agosto</option>
        <option value="9">Septiembre</option>
        <option value="10">Octubre</option>
        <option value="11">Noviembre</option>
        <option value="12">Diciembre</option>
      </select>
      <label>Año</label>
      <input type="number" id="inputAnio" value="2026" style="width:90px;">
      <button class="btn-ver" onclick="cargarCaja()">VER</button>
      <button class="btn-exportar" onclick="exportarExcel()">Exportar Excel</button>
    </div>

    <div class="resumen">
      <div class="resumen-item ingresos">
        <div class="etiqueta">INGRESOS</div>
        <div class="numero" id="totalIngresos">—</div>
      </div>
      <div class="resumen-item gastos">
        <div class="etiqueta">GASTOS</div>
        <div class="numero" id="totalGastos">—</div>
      </div>
      <div class="resumen-item resultado">
        <div class="etiqueta">RESULTADO</div>
        <div class="numero" id="totalResultado">—</div>
      </div>
    </div>

    <div class="seccion">
      <div class="seccion-header">
        <h2>INGRESOS DEL MES</h2>
        <span class="total-seccion total-ingreso" id="subtotalIngresos"></span>
      </div>
      <div id="listaIngresos"><div class="vacio">Seleccioná un período para ver los datos.</div></div>
    </div>

    <div class="seccion">
      <div class="seccion-header">
        <h2>GASTOS DEL MES</h2>
        <span class="total-seccion total-gasto" id="subtotalGastos"></span>
      </div>
      <div id="listaGastos"><div class="vacio">Seleccioná un período para ver los datos.</div></div>

      <button class="btn-agregar-gasto" id="btnAgregarGasto" onclick="toggleFormGasto()" style="display:none;">
        + Agregar gasto
      </button>

      <div class="form-gasto" id="formGasto">
        <div class="fila-doble">
          <div class="campo">
            <label>Descripción</label>
            <input type="text" id="gastoDescripcion" placeholder="Luz, internet, limpieza...">
          </div>
          <div class="campo">
            <label>Categoría</label>
            <select id="gastoCategoria">
              <option value="Servicios">Servicios</option>
              <option value="Mantenimiento">Mantenimiento</option>
              <option value="Personal">Personal</option>
              <option value="Equipamiento">Equipamiento</option>
              <option value="Impuestos">Impuestos</option>
              <option value="Otros">Otros</option>
            </select>
          </div>
        </div>
        <div class="fila-doble">
          <div class="campo">
            <label>Monto</label>
            <input type="number" id="gastoMonto" placeholder="25000" step="0.01">
          </div>
          <div class="campo">
            <label>Método</label>
            <select id="gastoMetodo">
              <option value="Efectivo">Efectivo</option>
              <option value="Transferencia">Transferencia</option>
              <option value="Débito">Débito</option>
              <option value="Tarjeta">Tarjeta</option>
            </select>
          </div>
        </div>
        <div class="form-gasto-acciones">
          <button class="btn-cancelar-gasto" onclick="toggleFormGasto()">Cancelar</button>
          <button class="btn-guardar-gasto" id="btnGuardarGasto" onclick="guardarGasto()">Guardar gasto</button>
        </div>
        <div class="mensaje" id="mensajeGasto"></div>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://hlhsrbstxxdanyckujem.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_NOA6FfVrGTtkX0eu_rvyZA_Uyye2XRl'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    async function verificarAcceso() {
      const { data } = await db.auth.getSession()
      if (!data.session) { window.location.href = 'login.html'; return }
      const { data: admin } = await db
        .from('administradores')
        .select('nombre')
        .eq('id', data.session.user.id)
        .eq('activo', true)
        .limit(1)
      if (!admin || admin.length === 0) {
        await db.auth.signOut()
        window.location.href = 'login.html'
      }
    }
    verificarAcceso()

    async function cerrarSesion() {
      await db.auth.signOut()
      window.location.href = 'login.html'
    }

    const nombresMes = ['', 'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
      'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre']

    // Precargar mes actual
    const ahora = new Date()
    document.getElementById('selectMes').value = ahora.getMonth() + 1
    document.getElementById('inputAnio').value = ahora.getFullYear()

    let ingresosActuales = []
    let gastosActuales = []

    function formatearPeso(monto) {
      return Number(monto).toLocaleString('es-AR', { style: 'currency', currency: 'ARS' })
    }

    function mostrarMensaje(id, texto, tipo) {
      const el = document.getElementById(id)
      el.className = `mensaje ${tipo}`
      el.textContent = texto
      el.style.display = 'block'
      setTimeout(() => { el.style.display = 'none' }, 4000)
    }

    async function cargarCaja() {
      const mes = parseInt(document.getElementById('selectMes').value)
      const anio = parseInt(document.getElementById('inputAnio').value)

      // Cargar ingresos (pagos de cuotas)
      const { data: pagos } = await db
        .from('pagos')
        .select('*, socios(nombre), membresias(planes(nombre))')
        .eq('anio', anio)
        .eq('mes', mes)
        .order('fecha_pago', { ascending: true })

      ingresosActuales = pagos || []
      renderizarIngresos(ingresosActuales)

      // Cargar gastos
      const { data: gastos } = await db
        .from('gastos_gym')
        .select('*')
        .eq('anio', anio)
        .eq('mes', mes)
        .order('created_at', { ascending: true })

      gastosActuales = gastos || []
      renderizarGastos(gastosActuales)

      actualizarResumen()

      document.getElementById('btnAgregarGasto').style.display = 'block'
    }

    function renderizarIngresos(pagos) {
      const lista = document.getElementById('listaIngresos')
      const subtotal = document.getElementById('subtotalIngresos')

      if (!pagos || pagos.length === 0) {
        lista.innerHTML = '<div class="vacio">No hay pagos registrados este mes.</div>'
        subtotal.textContent = ''
        return
      }

      lista.innerHTML = pagos.map(p => {
        const fecha = new Date(p.fecha_pago).toLocaleDateString('es-AR')
        const planNombre = p.membresias?.planes?.nombre || '—'
        return `
          <div class="item">
            <div>
              <div class="descripcion">${p.socios?.nombre || '—'}</div>
              <div class="detalle">${planNombre} · ${p.metodo} · ${fecha}${p.con_recargo ? ' · con recargo' : ''}</div>
            </div>
            <div class="monto-ingreso">${formatearPeso(p.monto)}</div>
          </div>
        `
      }).join('')

      const total = pagos.reduce((sum, p) => sum + Number(p.monto), 0)
      subtotal.textContent = formatearPeso(total)
    }

    function renderizarGastos(gastos) {
      const lista = document.getElementById('listaGastos')
      const subtotal = document.getElementById('subtotalGastos')

      if (!gastos || gastos.length === 0) {
        lista.innerHTML = '<div class="vacio">No hay gastos registrados este mes.</div>'
        subtotal.textContent = ''
        return
      }

      lista.innerHTML = gastos.map(g => {
        const fecha = new Date(g.created_at).toLocaleDateString('es-AR')
        return `
          <div class="item">
            <div>
              <div class="descripcion">${g.descripcion}</div>
              <div class="detalle">${g.categoria} · ${g.metodo} · ${fecha}</div>
            </div>
            <div style="display:flex;align-items:center;">
              <div class="monto-gasto">${formatearPeso(g.monto)}</div>
              <button class="btn-eliminar-gasto" onclick="eliminarGasto('${g.id}')">Eliminar</button>
            </div>
          </div>
        `
      }).join('')

      const total = gastos.reduce((sum, g) => sum + Number(g.monto), 0)
      subtotal.textContent = formatearPeso(total)
    }

    function actualizarResumen() {
      const totalIng = ingresosActuales.reduce((sum, p) => sum + Number(p.monto), 0)
      const totalGas = gastosActuales.reduce((sum, g) => sum + Number(g.monto), 0)
      const resultado = totalIng - totalGas

      document.getElementById('totalIngresos').textContent = formatearPeso(totalIng)
      document.getElementById('totalGastos').textContent = formatearPeso(totalGas)

      const elResultado = document.getElementById('totalResultado')
      elResultado.textContent = formatearPeso(resultado)
      elResultado.style.color = resultado >= 0 ? '#4cdf7a' : '#df4c4c'
    }

    function toggleFormGasto() {
      const form = document.getElementById('formGasto')
      form.classList.toggle('visible')
      if (form.classList.contains('visible')) {
        document.getElementById('gastoDescripcion').focus()
      }
    }

    async function guardarGasto() {
      const descripcion = document.getElementById('gastoDescripcion').value.trim()
      const categoria = document.getElementById('gastoCategoria').value
      const monto = parseFloat(document.getElementById('gastoMonto').value)
      const metodo = document.getElementById('gastoMetodo').value
      const mes = parseInt(document.getElementById('selectMes').value)
      const anio = parseInt(document.getElementById('inputAnio').value)

      if (!descripcion || !monto || monto <= 0) {
        mostrarMensaje('mensajeGasto', 'Completá la descripción y un monto válido.', 'error')
        return
      }

      const btn = document.getElementById('btnGuardarGasto')
      btn.disabled = true
      btn.textContent = 'Guardando...'

      const { error } = await db.from('gastos_gym').insert({
        descripcion, categoria, monto, metodo, mes, anio
      })

      btn.disabled = false
      btn.textContent = 'Guardar gasto'

      if (error) {
        mostrarMensaje('mensajeGasto', 'Error al guardar: ' + error.message, 'error')
        return
      }

      document.getElementById('gastoDescripcion').value = ''
      document.getElementById('gastoMonto').value = ''
      toggleFormGasto()
      await cargarCaja()
    }

    async function eliminarGasto(id) {
      if (!confirm('¿Eliminar este gasto?')) return

      const { error } = await db.from('gastos_gym').delete().eq('id', id)

      if (error) {
        alert('Error al eliminar: ' + error.message)
        return
      }

      await cargarCaja()
    }

    function exportarExcel() {
      const mes = parseInt(document.getElementById('selectMes').value)
      const anio = parseInt(document.getElementById('inputAnio').value)
      const periodo = `${nombresMes[mes]} ${anio}`

      const wb = XLSX.utils.book_new()

      // Hoja ingresos
      const dataIngresos = [
        ['INGRESOS — ' + periodo],
        ['Socio', 'Plan', 'Monto', 'Método', 'Con recargo', 'Fecha'],
        ...ingresosActuales.map(p => [
          p.socios?.nombre || '—',
          p.membresias?.planes?.nombre || '—',
          Number(p.monto),
          p.metodo,
          p.con_recargo ? 'Sí' : 'No',
          new Date(p.fecha_pago).toLocaleDateString('es-AR')
        ]),
        [],
        ['TOTAL', '', ingresosActuales.reduce((s, p) => s + Number(p.monto), 0)]
      ]
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dataIngresos), 'Ingresos')

      // Hoja gastos
      const dataGastos = [
        ['GASTOS — ' + periodo],
        ['Descripción', 'Categoría', 'Monto', 'Método', 'Fecha'],
        ...gastosActuales.map(g => [
          g.descripcion,
          g.categoria,
          Number(g.monto),
          g.metodo,
          new Date(g.created_at).toLocaleDateString('es-AR')
        ]),
        [],
        ['TOTAL', '', gastosActuales.reduce((s, g) => s + Number(g.monto), 0)]
      ]
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dataGastos), 'Gastos')

      // Hoja resumen
      const totalIng = ingresosActuales.reduce((s, p) => s + Number(p.monto), 0)
      const totalGas = gastosActuales.reduce((s, g) => s + Number(g.monto), 0)
      const dataResumen = [
        ['RESUMEN — ' + periodo],
        [],
        ['Total ingresos', totalIng],
        ['Total gastos', totalGas],
        ['Resultado', totalIng - totalGas]
      ]
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dataResumen), 'Resumen')

      XLSX.writeFile(wb, `LionGym_Caja_${nombresMes[mes]}_${anio}.xlsx`)
    }

    // Cargar mes actual al entrar
    cargarCaja()
  </script>
</body>
</html>
